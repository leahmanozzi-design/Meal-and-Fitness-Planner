<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mise en Place</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#faf7fc; --header:#232e4a; --header-tab-active-bg:#ede1f5; --header-tab-active-text:#232e4a;
    --header-tab-inactive:#b8a9c9;
    --card-bg:#fffdfb; --card-border:#e3d3ee;
    --input-border:#d9c8e6;
    --primary:#4f6fa3; --primary-text:#fff;
    --icon:#6b6082; --label:#8a7d9c;
    --tag-bg:#ece1f2; --tag-text:#4f6fa3;
    --row-a:#fffdfb; --row-b:#f4eef8;
    --pill-fresh-bg:#f1e9f7; --pill-fresh-text:#7a5c94;
    --pill-soon-bg:#ded0ea; --pill-soon-text:#5b3f78;
    --pill-expired-bg:#d7dae8; --pill-expired-text:#2c3454;
    --pill-neutral-bg:#eef1f3; --pill-neutral-text:#5c6b78;
    --banner-bg:#ece1f2; --banner-border:#d3bfe0; --banner-text:#4a3660; --banner-btn:#5b3f78;
    --danger:#5b3f78;
    --text:#2c2c2c;
    --font-serif:'Fraunces', Georgia, serif;
    --font-sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--font-sans); }
  h1,h2,h3{ font-family:var(--font-serif); margin:0; }
  button{ font-family:var(--font-sans); cursor:pointer; }
  input,select,textarea{ font-family:var(--font-sans); }

  header{ background:var(--header); padding:18px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; box-shadow:0 2px 12px rgba(0,0,0,0.14); }
  .kicker{ color:var(--header-tab-inactive); font-size:10px; letter-spacing:4px; text-transform:uppercase; margin-bottom:3px; }
  header h1{ color:#fff; font-size:24px; font-weight:700; letter-spacing:-0.5px; }
  nav{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  nav button{ background:transparent; color:var(--header-tab-inactive); border:1.5px solid rgba(184,169,201,0.4); border-radius:6px; padding:7px 13px; font-size:13px; }
  nav button.active{ background:var(--header-tab-active-bg); color:var(--header-tab-active-text); border-color:var(--header-tab-active-bg); font-weight:700; }
  .save-note{ font-size:11px; color:#b7a8d6; margin-left:6px; }

  main{ max-width:1000px; margin:0 auto; padding:24px 16px 60px; }

  .card{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:18px; box-shadow:0 1px 4px rgba(35,46,74,0.06); margin-bottom:16px; }
  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
  .stat-card{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:14px 16px; }
  .stat-value{ font-size:26px; font-weight:700; color:var(--header); }
  .stat-label{ font-size:11px; color:var(--label); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

  .banner{ background:var(--banner-bg); border:1.5px solid var(--banner-border); border-radius:10px; padding:12px 16px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .banner b{ color:var(--banner-text); }
  .banner span.sub{ color:var(--label); margin-left:6px; }

  .btn-primary{ background:var(--primary); color:#fff; border:none; border-radius:8px; padding:9px 16px; font-size:14px; font-weight:600; white-space:nowrap; }
  .btn-ghost{ background:transparent; color:var(--primary); border:1.5px solid var(--primary); border-radius:8px; padding:8px 15px; font-size:14px; white-space:nowrap; }
  .btn-danger{ background:var(--banner-btn); color:#fff; border:none; border-radius:8px; padding:8px 15px; font-size:13px; }
  .icon-btn{ background:transparent; border:none; font-size:15px; padding:2px 5px; color:var(--icon); }
  .icon-btn.remove{ color:var(--danger); }

  label.field-label{ display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--label); margin-bottom:5px; }
  input[type=text],input[type=number],input[type=date],select,textarea{
    background:#fff; border:1.5px solid var(--input-border); border-radius:8px; padding:8px 12px; font-size:14px; color:var(--text); width:100%; outline:none;
  }

  .controls-row{ display:flex; gap:8px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
  .controls-row input, .controls-row select{ width:auto; min-width:140px; }

  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .form-grid3{ display:grid; grid-template-columns:1fr 1fr 2fr; gap:8px; }
  @media (max-width:600px){ .form-grid,.form-grid3{ grid-template-columns:1fr 1fr; } .stat-grid{ grid-template-columns:1fr 1fr; } }

  .table-wrap{ border:1px solid var(--card-border); border-radius:10px; overflow:hidden; }
  .table-scroll{ overflow-x:auto; }
  .table-inner{ min-width:680px; }
  .t-head{ display:grid; grid-template-columns:2fr 1fr 1fr 0.8fr 1fr 116px; gap:10px; padding:10px 14px; background:#eef1f3; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#5c6b78; }
  .t-row{ display:grid; grid-template-columns:2fr 1fr 1fr 0.8fr 1fr 116px; gap:10px; align-items:center; padding:11px 14px; }
  .t-row .name{ font-weight:700; font-size:14px; }
  .t-row .meta{ font-size:11px; color:var(--label); display:flex; gap:8px; flex-wrap:wrap; margin-top:2px; }
  .t-row .actions{ display:flex; gap:2px; justify-content:flex-end; }
  .pill{ border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; white-space:nowrap; display:inline-block; }
  .pill-fresh{ background:var(--pill-fresh-bg); color:var(--pill-fresh-text); }
  .pill-soon{ background:var(--pill-soon-bg); color:var(--pill-soon-text); }
  .pill-expired{ background:var(--pill-expired-bg); color:var(--pill-expired-text); }

  .empty-state{ text-align:center; padding:50px 20px; color:#a99f8a; border:1px solid var(--card-border); border-radius:10px; }
  .empty-state .emoji{ font-size:44px; margin-bottom:10px; }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:2000; display:flex; align-items:center; justify-content:center; padding:14px; }
  .modal{ background:#fff; border-radius:16px; width:100%; max-width:640px; max-height:90vh; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(0,0,0,0.18); }
  .modal-header{ padding:18px 22px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .modal-body{ overflow-y:auto; padding:16px 22px; flex:1; }
  .modal-footer{ padding:14px 22px; border-top:1px solid #eee; display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }

  .prompt-box{ background:#f7f4fa; border:1px solid var(--card-border); border-radius:8px; padding:12px; font-size:12px; font-family:monospace; white-space:pre-wrap; max-height:160px; overflow-y:auto; margin-bottom:10px; }
  .review-row{ display:grid; grid-template-columns:28px 1fr; gap:10px; padding:10px 0; border-bottom:1px solid #f0ede6; }
  .toast{ position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--header); color:#fff; border-radius:10px; padding:11px 22px; font-size:13px; font-weight:600; z-index:4000; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────
const STORAGE_KEY = "mise-en-place-data";
const CATEGORIES = ["Produce","Dairy","Meat & Seafood","Grains & Pasta","Canned & Jarred","Frozen","Spices & Condiments","Snacks","Beverages","Other"];
const SUBSECTIONS = ["Freezer","Deep Freezer","Refrigerator","Pantry"];
const SUBSECTION_ICONS = { "Freezer":"🧊", "Deep Freezer":"❄️", "Refrigerator":"🌡️", "Pantry":"🗄️" };
const TABS = ["WHTAH","Recipes","Meal Plan","Grocery List","Nutrition"];

const DEFAULT_DATA = {
  pantry: [],
  recipes: [],
  mealPlan: {},
  groceryList: [],
  nutritionLog: [],
  userProfile: null
};

const EMPTY_ITEM = { name:"", category:"Produce", qty:"", expiry:"", brand:"", store:"", notes:"", subsection:"" };

const IMPORT_PROMPT = `Extract every food or household consumable item from what I'm about to share (could be a receipt photo, order confirmation screenshot, or a plain list).

Return ONLY valid JSON, no markdown, no preamble, in exactly this format:
{
  "items": [
    {
      "name": "clean readable product name",
      "qty": "quantity with unit if known, else empty string",
      "brand": "brand name if identifiable, else empty string",
      "category": one of exactly: "Produce","Dairy","Meat & Seafood","Grains & Pasta","Canned & Jarred","Frozen","Spices & Condiments","Snacks","Beverages","Other",
      "notes": "useful detail like variety, size, organic, else empty string",
      "store": "store or service name if identifiable, else empty string"
    }
  ]
}`;

// ── STATE ─────────────────────────────────────────────────────────────────
let state = loadState();
let currentTab = "WHTAH";
let saveStatus = "saved";

// WHTAH-local UI state (not persisted)
let pantrySearch = "";
let pantryFilterCat = "All";
let pantryFilterSub = "All";
let showAddForm = false;
let editingId = null;
let showImportModal = false;
let importStage = "instructions"; // instructions -> review
let importParsed = [];
let showAssignModal = false;
let assignChoices = {};
let toastMsg = "";

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return { ...DEFAULT_DATA, ...JSON.parse(raw) };
  }catch(e){ console.error("Load failed", e); }
  return { ...DEFAULT_DATA };
}

function saveState(){
  saveStatus = "saving";
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    saveStatus = "saved";
  }catch(e){
    saveStatus = "error";
    console.error("Save failed", e);
  }
  renderHeaderStatus();
}

function showToast(msg){
  toastMsg = msg;
  render();
  setTimeout(()=>{ toastMsg = ""; render(); }, 3200);
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function esc(str){
  return String(str ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function getExpiryStatus(item){
  if(!item.expiry) return null;
  const days = Math.ceil((new Date(item.expiry) - new Date()) / 86400000);
  if(days < 0) return { tone:"expired", label:"Expired" };
  if(days <= 7) return { tone:"soon", label:"Use Soon" };
  return { tone:"fresh", label:"Fresh" };
}

function categoryOptions(selected){
  return CATEGORIES.map(c => `<option value="${esc(c)}" ${c===selected?"selected":""}>${esc(c)}</option>`).join("");
}
function subsectionOptions(selected){
  return `<option value="">— pick one —</option>` + SUBSECTIONS.map(s => `<option value="${esc(s)}" ${s===selected?"selected":""}>${esc(s)}</option>`).join("");
}

// ── RENDER: SHELL ─────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div>
        <div class="kicker">Kitchen</div>
        <h1>Mise en Place</h1>
      </div>
      <nav>
        ${TABS.map(t => `<button class="${t===currentTab?'active':''}" onclick="setTab('${t}')">${t}</button>`).join("")}
        <span class="save-note" id="save-note"></span>
      </nav>
    </header>
    <main id="main"></main>
    ${toastMsg ? `<div class="toast">${esc(toastMsg)}</div>` : ""}
    ${showImportModal ? renderImportModal() : ""}
    ${showAssignModal ? renderAssignModal() : ""}
  `;
  renderHeaderStatus();
  renderTab();
}

function renderHeaderStatus(){
  const el = document.getElementById("save-note");
  if(!el) return;
  el.textContent = saveStatus === "saving" ? "⟳ Saving…" : saveStatus === "error" ? "⚠ Save error" : "✓ Saved";
}

function setTab(tab){
  currentTab = tab;
  showAddForm = false;
  editingId = null;
  render();
}

function renderTab(){
  const main = document.getElementById("main");
  if(currentTab === "WHTAH"){ main.innerHTML = pantryTabShell(); renderPantryTable(); }
  else{
    main.innerHTML = `<div class="empty-state"><div class="emoji">🚧</div><div>${esc(currentTab)} is coming in the next build pass.</div></div>`;
  }
}

// ── WHTAH TAB ─────────────────────────────────────────────────────────────
function pantryTabShell(){
  const unassigned = state.pantry.filter(i => !i.subsection);
  const useSoonCount = state.pantry.filter(i => { const s = getExpiryStatus(i); return s && (s.tone==="soon"||s.tone==="expired"); }).length;

  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${state.pantry.length}</div><div class="stat-label">Items in stock</div></div>
      <div class="stat-card"><div class="stat-value" style="${useSoonCount>0?'color:#5b3f78':''}">${useSoonCount}</div><div class="stat-label">Use soon</div></div>
      <div class="stat-card"><div class="stat-value" style="${unassigned.length>0?'color:#2c3454':''}">${unassigned.length}</div><div class="stat-label">Unassigned</div></div>
    </div>

    ${unassigned.length > 0 ? `
      <div class="banner">
        <div><b>📦 ${unassigned.length} item${unassigned.length!==1?'s':''} need a home.</b><span class="sub">Assign them to Freezer, Fridge, or Pantry.</span></div>
        <button class="btn-primary" style="background:var(--banner-btn)" onclick="openAssignModal()">Assign Now</button>
      </div>` : ""}

    <div class="controls-row">
      <input type="text" id="pantry-search" placeholder="Search by name or brand…" value="${esc(pantrySearch)}" oninput="onPantrySearch(this.value)">
      <select id="pantry-filter-sub" onchange="onPantryFilterSub(this.value)">
        <option value="All" ${pantryFilterSub==='All'?'selected':''}>All locations</option>
        ${SUBSECTIONS.map(s=>`<option value="${esc(s)}" ${pantryFilterSub===s?'selected':''}>${esc(s)}</option>`).join("")}
      </select>
      <select id="pantry-filter-cat" onchange="onPantryFilterCat(this.value)">
        <option value="All" ${pantryFilterCat==='All'?'selected':''}>All categories</option>
        ${categoryOptions(pantryFilterCat==='All'?null:pantryFilterCat)}
      </select>
      <button class="btn-primary" onclick="toggleAddForm()">+ Add Item</button>
      <button class="btn-ghost" onclick="openImportModal()">📋 Import Items</button>
      <button class="btn-ghost" onclick="exportBackup()">⬇ Export Backup</button>
      <label class="btn-ghost" style="display:inline-block;">
        ⬆ Import Backup
        <input type="file" accept=".json" style="display:none" onchange="importBackup(this.files[0])">
      </label>
    </div>

    ${showAddForm ? `
      <div class="card">
        <h3 style="font-size:16px;margin-bottom:12px;">Add Item</h3>
        ${itemFormFields("add")}
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn-primary" onclick="submitAddItem()">Add</button>
          <button class="btn-ghost" onclick="toggleAddForm()">Cancel</button>
        </div>
      </div>` : ""}

    <div class="table-wrap">
      <div class="table-scroll">
        <div class="table-inner">
          <div class="t-head"><div>Item</div><div>Category</div><div>Location</div><div>Qty</div><div>Status</div><div></div></div>
          <div id="pantry-table-body"></div>
        </div>
      </div>
    </div>
  `;
}

function itemFormFields(mode, item){
  item = item || EMPTY_ITEM;
  const prefix = mode === "edit" ? "edit" : "add";
  return `
    <div class="form-grid">
      <div><label class="field-label">Item Name</label><input type="text" id="${prefix}-name" value="${esc(item.name)}" placeholder="e.g. Whole Milk"></div>
      <div><label class="field-label">Category</label><select id="${prefix}-category">${categoryOptions(item.category)}</select></div>
      <div><label class="field-label">Stored In</label><select id="${prefix}-subsection">${subsectionOptions(item.subsection)}</select></div>
      <div><label class="field-label">Quantity</label><input type="text" id="${prefix}-qty" value="${esc(item.qty)}" placeholder="e.g. 2 cups"></div>
      <div><label class="field-label">Expiry Date</label><input type="date" id="${prefix}-expiry" value="${esc(item.expiry)}"></div>
    </div>
    <div class="form-grid3">
      <div><label class="field-label">Brand</label><input type="text" id="${prefix}-brand" value="${esc(item.brand)}" placeholder="e.g. Organic Valley"></div>
      <div><label class="field-label">Store</label><input type="text" id="${prefix}-store" value="${esc(item.store)}" placeholder="e.g. Trader Joe's"></div>
      <div><label class="field-label">Notes</label><input type="text" id="${prefix}-notes" value="${esc(item.notes)}" placeholder="e.g. 16 oz, low-fat"></div>
    </div>
  `;
}

function readItemForm(prefix){
  return {
    name: document.getElementById(`${prefix}-name`).value.trim(),
    category: document.getElementById(`${prefix}-category`).value,
    subsection: document.getElementById(`${prefix}-subsection`).value,
    qty: document.getElementById(`${prefix}-qty`).value.trim(),
    expiry: document.getElementById(`${prefix}-expiry`).value,
    brand: document.getElementById(`${prefix}-brand`).value.trim(),
    store: document.getElementById(`${prefix}-store`).value.trim(),
    notes: document.getElementById(`${prefix}-notes`).value.trim(),
  };
}

function toggleAddForm(){ showAddForm = !showAddForm; editingId = null; renderTab(); }

function submitAddItem(){
  const item = readItemForm("add");
  if(!item.name) return;
  state.pantry.push({ ...item, id: Date.now() });
  saveState();
  showAddForm = false;
  renderTab();
}

function onPantrySearch(v){ pantrySearch = v; renderPantryTable(); }
function onPantryFilterSub(v){ pantryFilterSub = v; renderPantryTable(); }
function onPantryFilterCat(v){ pantryFilterCat = v; renderPantryTable(); }

function getFilteredSortedPantry(){
  const filtered = state.pantry.filter(i =>
    (pantryFilterCat==="All" || i.category===pantryFilterCat) &&
    (pantryFilterSub==="All" || (i.subsection||"")===pantryFilterSub) &&
    (i.name.toLowerCase().includes(pantrySearch.toLowerCase()) || (i.brand||"").toLowerCase().includes(pantrySearch.toLowerCase()))
  );
  const rank = { expired:0, soon:1, fresh:2 };
  return filtered.sort((a,b)=>{
    const sa=getExpiryStatus(a), sb=getExpiryStatus(b);
    const ra = sa?rank[sa.tone]:3, rb = sb?rank[sb.tone]:3;
    if(ra!==rb) return ra-rb;
    return a.name.localeCompare(b.name);
  });
}

function renderPantryTable(){
  const body = document.getElementById("pantry-table-body");
  if(!body) return;
  const items = getFilteredSortedPantry();
  if(!items.length){
    body.innerHTML = `<div class="empty-state"><div class="emoji">🥦</div><div>No items found. Add something!</div></div>`;
    return;
  }
  body.innerHTML = items.map((item, idx) => {
    if(editingId === item.id){
      return `<div style="padding:14px 16px;background:#fff;border:2px solid var(--primary);">
        ${itemFormFields("edit", item)}
        <div style="display:flex;gap:6px;margin-top:12px;">
          <button class="btn-primary" onclick="submitEditItem(${item.id})">Save</button>
          <button class="btn-ghost" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>`;
    }
    const status = getExpiryStatus(item);
    const bg = idx % 2 === 0 ? "var(--row-a)" : "var(--row-b)";
    return `<div class="t-row" style="background:${bg}">
      <div>
        <div class="name">${esc(item.name)}</div>
        <div class="meta">
          ${item.brand ? `<span>🏷 ${esc(item.brand)}</span>`:""}
          ${item.store ? `<span>🏪 ${esc(item.store)}</span>`:""}
          ${item.notes ? `<span style="font-style:italic">${esc(item.notes)}</span>`:""}
        </div>
      </div>
      <div style="font-size:13px;">${esc(item.category)}</div>
      <div style="font-size:13px;${item.subsection?'':'color:#b08a5a'}">${item.subsection ? `${SUBSECTION_ICONS[item.subsection]||""} ${esc(item.subsection)}` : "— unassigned"}</div>
      <div style="font-size:13px;">${esc(item.qty)||"—"}</div>
      <div>${status ? `<span class="pill pill-${status.tone}">${status.label}</span>` : ""}</div>
      <div class="actions">
        <button class="icon-btn" title="Add to grocery list" onclick="addToGrocery(${item.id})">🛒</button>
        <button class="icon-btn" title="Edit" onclick="startEdit(${item.id})">✏️</button>
        <button class="icon-btn remove" title="Remove" onclick="removeItem(${item.id})">✕</button>
      </div>
    </div>`;
  }).join("");
}

function startEdit(id){ editingId = id; showAddForm = false; renderPantryTable(); }
function cancelEdit(){ editingId = null; renderPantryTable(); }

function submitEditItem(id){
  const updated = readItemForm("edit");
  if(!updated.name) return;
  state.pantry = state.pantry.map(i => i.id===id ? { ...i, ...updated } : i);
  saveState();
  editingId = null;
  renderPantryTable();
  renderTab(); // refresh stat cards / unassigned banner
}

function removeItem(id){
  state.pantry = state.pantry.filter(i => i.id !== id);
  saveState();
  renderTab();
}

function addToGrocery(id){
  const item = state.pantry.find(i => i.id === id);
  if(!item) return;
  if(!state.groceryList.find(g => g.name === item.name)){
    state.groceryList.push({ id: Date.now(), name:item.name, category:item.category, brand:item.brand||"", store:item.store||"", notes:item.notes||"", checked:false });
    saveState();
    showToast("Added to grocery list");
  }
}

// ── ASSIGN UNASSIGNED MODAL ──────────────────────────────────────────────
function openAssignModal(){
  assignChoices = {};
  state.pantry.filter(i=>!i.subsection).forEach(i => assignChoices[i.id] = "");
  showAssignModal = true;
  render();
}
function closeAssignModal(){ showAssignModal = false; render(); }
function onAssignChoice(id, val){ assignChoices[id] = val; renderAssignModalBody(); }

function renderAssignModal(){
  const items = state.pantry.filter(i=>!i.subsection);
  return `<div class="modal-backdrop">
    <div class="modal" style="max-width:520px;">
      <div class="modal-header">
        <div><h2 style="font-size:18px;">📦 Where does this live?</h2><div style="font-size:12px;color:#888;">Assign each item to a location.</div></div>
      </div>
      <div class="modal-body" id="assign-modal-body">${renderAssignRows(items)}</div>
      <div class="modal-footer">
        <button class="btn-primary" id="assign-save-btn" onclick="saveAssignments()" disabled>Save All</button>
        <button class="btn-ghost" onclick="closeAssignModal()">Later</button>
      </div>
    </div>
  </div>`;
}
function renderAssignRows(items){
  return items.map(item => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div style="flex:1;font-weight:600;font-size:14px;">${esc(item.name)}</div>
      <select style="max-width:150px" onchange="onAssignChoice(${item.id}, this.value)">
        <option value="">— pick —</option>
        ${SUBSECTIONS.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("")}
      </select>
    </div>`).join("");
}
function renderAssignModalBody(){
  const body = document.getElementById("assign-modal-body");
  const items = state.pantry.filter(i=>!i.subsection);
  if(body) body.innerHTML = renderAssignRows(items);
  const allSet = items.every(i => assignChoices[i.id]);
  const btn = document.getElementById("assign-save-btn");
  if(btn) btn.disabled = !allSet;
}
function saveAssignments(){
  state.pantry = state.pantry.map(i => assignChoices[i.id] ? { ...i, subsection: assignChoices[i.id] } : i);
  saveState();
  showAssignModal = false;
  render();
}

// ── IMPORT ITEMS (paste JSON from a companion Claude chat) ──────────────
function openImportModal(){ showImportModal = true; importStage = "instructions"; importParsed = []; render(); }
function closeImportModal(){ showImportModal = false; render(); }

function copyImportPrompt(){
  navigator.clipboard.writeText(IMPORT_PROMPT).then(()=> showToast("Prompt copied")).catch(()=>{});
}

function parseImportJson(){
  const raw = document.getElementById("import-json-input").value;
  const errEl = document.getElementById("import-json-error");
  try{
    const parsed = JSON.parse(raw);
    if(!parsed.items || !parsed.items.length) throw new Error("No items found in that JSON.");
    const pantryNames = state.pantry.map(p=>p.name.toLowerCase());
    importParsed = parsed.items.map((item,i)=>({
      ...EMPTY_ITEM, ...item, id: Date.now()+i, selected:true,
      isDuplicate: pantryNames.includes((item.name||"").toLowerCase())
    }));
    importStage = "review";
    render();
  }catch(e){
    if(errEl) errEl.textContent = "Couldn't read that as JSON: " + e.message;
  }
}

function toggleImportSel(id, checked){
  importParsed = importParsed.map(x => x.id===id ? {...x, selected:checked} : x);
  renderImportReviewBody();
}
function importSelectAll(v){ importParsed = importParsed.map(x=>({...x, selected:v})); renderImportReviewBody(); }

function confirmImport(){
  const toAdd = importParsed.filter(i=>i.selected).map(({id,selected,isDuplicate,...item})=>({...item, id: Date.now()+Math.random()}));
  state.pantry.push(...toAdd);
  saveState();
  showImportModal = false;
  render();
  showToast(`✅ ${toAdd.length} item${toAdd.length!==1?'s':''} added`);
}

function renderImportModal(){
  if(importStage === "instructions"){
    return `<div class="modal-backdrop">
      <div class="modal" style="max-width:560px;">
        <div class="modal-header">
          <div><h2 style="font-size:18px;">📋 Import Items</h2><div style="font-size:12px;color:#888;">Parse with Claude, then paste the result here</div></div>
          <button class="icon-btn" style="font-size:20px;" onclick="closeImportModal()">✕</button>
        </div>
        <div class="modal-body">
          <p style="font-size:13px;line-height:1.6;">1. Open a Claude chat.<br>2. Paste this prompt, plus your receipt photo or list:</p>
          <div class="prompt-box">${esc(IMPORT_PROMPT)}</div>
          <button class="btn-ghost" onclick="copyImportPrompt()" style="margin-bottom:16px;">📋 Copy Prompt</button>
          <p style="font-size:13px;line-height:1.6;">3. Paste Claude's JSON reply below:</p>
          <textarea id="import-json-input" rows="8" placeholder='{"items":[...]}' style="font-family:monospace;font-size:12px;"></textarea>
          <div id="import-json-error" style="color:#c62828;font-size:12px;margin-top:6px;"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-primary" onclick="parseImportJson()">Parse & Review</button>
          <button class="btn-ghost" onclick="closeImportModal()">Cancel</button>
        </div>
      </div>
    </div>`;
  }
  // review stage
  const selectedCount = importParsed.filter(i=>i.selected).length;
  return `<div class="modal-backdrop">
    <div class="modal" style="max-width:700px;">
      <div class="modal-header">
        <div><h2 style="font-size:18px;">Review Items</h2><div style="font-size:12px;color:#888;" id="import-review-count">${selectedCount} of ${importParsed.length} selected</div></div>
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="importSelectAll(true)">All</button>
          <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="importSelectAll(false)">None</button>
          <button class="icon-btn" style="font-size:20px;" onclick="closeImportModal()">✕</button>
        </div>
      </div>
      <div class="modal-body" id="import-review-body">${renderImportReviewRows()}</div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="confirmImport()">✅ Add ${selectedCount} items</button>
        <button class="btn-ghost" onclick="closeImportModal()" style="margin-left:auto;">Cancel</button>
      </div>
    </div>
  </div>`;
}
function renderImportReviewRows(){
  return importParsed.map(item => `
    <div class="review-row" style="opacity:${item.selected?1:0.4}">
      <input type="checkbox" ${item.selected?"checked":""} onchange="toggleImportSel(${item.id}, this.checked)">
      <div>
        ${item.isDuplicate ? `<div style="font-size:11px;color:#8a6238;font-weight:600;margin-bottom:4px;">⚠ Already in pantry</div>` : ""}
        <div style="font-weight:700;font-size:14px;">${esc(item.name)}</div>
        <div style="font-size:12px;color:#888;">${esc(item.category)}${item.qty?" · "+esc(item.qty):""}${item.brand?" · "+esc(item.brand):""}</div>
      </div>
    </div>`).join("");
}
function renderImportReviewBody(){
  const body = document.getElementById("import-review-body");
  if(body) body.innerHTML = renderImportReviewRows();
  const count = document.getElementById("import-review-count");
  const selectedCount = importParsed.filter(i=>i.selected).length;
  if(count) count.textContent = `${selectedCount} of ${importParsed.length} selected`;
}

// ── BACKUP EXPORT / IMPORT ───────────────────────────────────────────────
function exportBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `mise-en-place-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      state = { ...DEFAULT_DATA, ...parsed };
      saveState();
      render();
      showToast("✅ Backup loaded");
    }catch(e){
      showToast("Couldn't read that backup file");
    }
  };
  reader.readAsText(file);
}

// ── INIT ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
