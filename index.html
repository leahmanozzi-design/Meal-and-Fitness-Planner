<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal and Fitness Planner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#faf7fc; --header:#232e4a; --header-tab-active-bg:#ede1f5; --header-tab-active-text:#232e4a;
    --header-tab-inactive:#b8a9c9;
    --card-bg:#fffdfb; --card-border:#e3d3ee;
    --input-border:#d9c8e6;
    --primary:#4f6fa3; --primary-text:#fff;
    --icon:#6b6082; --label:#8a7d9c;
    --tag-bg:#ece1f2; --tag-text:#4f6fa3;
    --row-a:#fffdfb; --row-b:#f4eef8;
    --pill-fresh-bg:#f1e9f7; --pill-fresh-text:#7a5c94;
    --pill-soon-bg:#ded0ea; --pill-soon-text:#5b3f78;
    --pill-expired-bg:#d7dae8; --pill-expired-text:#2c3454;
    --pill-neutral-bg:#eef1f3; --pill-neutral-text:#5c6b78;
    --banner-bg:#ece1f2; --banner-border:#d3bfe0; --banner-text:#4a3660; --banner-btn:#5b3f78;
    --danger:#5b3f78;
    --text:#2c2c2c;
    --font-serif:'Fraunces', Georgia, serif;
    --font-sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--font-sans); }
  h1,h2,h3{ font-family:var(--font-serif); margin:0; }
  button{ font-family:var(--font-sans); cursor:pointer; }
  input,select,textarea{ font-family:var(--font-sans); }

  header{ background:var(--header); padding:18px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; box-shadow:0 2px 12px rgba(0,0,0,0.14); }
  .kicker{ color:var(--header-tab-inactive); font-size:10px; letter-spacing:4px; text-transform:uppercase; margin-bottom:3px; }
  header h1{ color:#fff; font-size:24px; font-weight:700; letter-spacing:-0.5px; }
  nav{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  nav button{ background:transparent; color:var(--header-tab-inactive); border:1.5px solid rgba(184,169,201,0.4); border-radius:6px; padding:7px 13px; font-size:13px; }
  nav button.active{ background:var(--header-tab-active-bg); color:var(--header-tab-active-text); border-color:var(--header-tab-active-bg); font-weight:700; }
  .save-note{ font-size:11px; color:#b7a8d6; margin-left:6px; }

  main{ max-width:1000px; margin:0 auto; padding:24px 16px 60px; }

  .card{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:18px; box-shadow:0 1px 4px rgba(35,46,74,0.06); margin-bottom:16px; }
  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
  .stat-card{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:14px 16px; }
  .stat-value{ font-size:26px; font-weight:700; color:var(--header); }
  .stat-label{ font-size:11px; color:var(--label); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

  .banner{ background:var(--banner-bg); border:1.5px solid var(--banner-border); border-radius:10px; padding:12px 16px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .banner b{ color:var(--banner-text); }
  .banner span.sub{ color:var(--label); margin-left:6px; }

  .btn-primary{ background:var(--primary); color:#fff; border:none; border-radius:8px; padding:9px 16px; font-size:14px; font-weight:600; white-space:nowrap; }
  .btn-ghost{ background:transparent; color:var(--primary); border:1.5px solid var(--primary); border-radius:8px; padding:8px 15px; font-size:14px; white-space:nowrap; }
  .btn-danger{ background:var(--banner-btn); color:#fff; border:none; border-radius:8px; padding:8px 15px; font-size:13px; }
  .icon-btn{ background:transparent; border:none; font-size:15px; padding:2px 5px; color:var(--icon); }
  .icon-btn.remove{ color:var(--danger); }

  label.field-label{ display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--label); margin-bottom:5px; }
  input[type=text],input[type=number],input[type=date],select,textarea{
    background:#fff; border:1.5px solid var(--input-border); border-radius:8px; padding:8px 12px; font-size:14px; color:var(--text); width:100%; outline:none;
  }

  .controls-row{ display:flex; gap:8px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
  .controls-row input, .controls-row select{ width:auto; min-width:140px; }

  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .form-grid3{ display:grid; grid-template-columns:1fr 1fr 2fr; gap:8px; }
  @media (max-width:600px){ .form-grid,.form-grid3{ grid-template-columns:1fr 1fr; } .stat-grid{ grid-template-columns:1fr 1fr; } }

  .table-wrap{ border:1px solid var(--card-border); border-radius:10px; overflow:hidden; }
  .table-scroll{ overflow-x:auto; }
  .table-inner{ min-width:680px; }
  .t-head{ display:grid; grid-template-columns:2fr 1fr 1fr 0.8fr 1fr 116px; gap:10px; padding:10px 14px; background:#eef1f3; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#5c6b78; }
  .t-row{ display:grid; grid-template-columns:2fr 1fr 1fr 0.8fr 1fr 116px; gap:10px; align-items:center; padding:11px 14px; }
  .t-row .name{ font-weight:700; font-size:14px; }
  .t-row .meta{ font-size:11px; color:var(--label); display:flex; gap:8px; flex-wrap:wrap; margin-top:2px; }
  .t-row .actions{ display:flex; gap:2px; justify-content:flex-end; }
  .pill{ border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; white-space:nowrap; display:inline-block; }
  .pill-fresh{ background:var(--pill-fresh-bg); color:var(--pill-fresh-text); }
  .pill-soon{ background:var(--pill-soon-bg); color:var(--pill-soon-text); }
  .pill-expired{ background:var(--pill-expired-bg); color:var(--pill-expired-text); }

  .empty-state{ text-align:center; padding:50px 20px; color:#a99f8a; border:1px solid var(--card-border); border-radius:10px; }
  .empty-state .emoji{ font-size:44px; margin-bottom:10px; }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:2000; display:flex; align-items:center; justify-content:center; padding:14px; }
  .modal{ background:#fff; border-radius:16px; width:100%; max-width:640px; max-height:90vh; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(0,0,0,0.18); }
  .modal-header{ padding:18px 22px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .modal-body{ overflow-y:auto; padding:16px 22px; flex:1; }
  .modal-footer{ padding:14px 22px; border-top:1px solid #eee; display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }

  .prompt-box{ background:#f7f4fa; border:1px solid var(--card-border); border-radius:8px; padding:12px; font-size:12px; font-family:monospace; white-space:pre-wrap; max-height:160px; overflow-y:auto; margin-bottom:10px; }
  .review-row{ display:grid; grid-template-columns:28px 1fr; gap:10px; padding:10px 0; border-bottom:1px solid #f0ede6; }
  .toast{ position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--header); color:#fff; border-radius:10px; padding:11px 22px; font-size:13px; font-weight:600; z-index:4000; box-shadow:0 4px 20px rgba(0,0,0,0.2); }

  /* Nutrition tab */
  .subnav{ display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .subnav button{ background:transparent; color:var(--primary); border:1.5px solid var(--primary); border-radius:8px; padding:6px 13px; font-size:12px; }
  .subnav button.active{ background:var(--primary); color:#fff; }
  .nbar-row{ margin-bottom:7px; }
  .nbar-labels{ display:flex; justify-content:space-between; font-size:11px; margin-bottom:2px; }
  .nbar-track{ height:5px; background:#f0ede6; border-radius:3px; overflow:hidden; }
  .nbar-fill{ height:100%; border-radius:3px; }
  .ring-wrap{ display:flex; justify-content:space-around; margin-bottom:18px; flex-wrap:wrap; }
  .ring-item{ text-align:center; }
  .ring-item .val{ font-size:15px; font-weight:700; margin-top:-46px; }
  .ring-item .lbl{ font-size:9px; color:#aaa; margin-top:36px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid5{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media (max-width:700px){ .grid2,.grid3{ grid-template-columns:1fr; } .grid5{ grid-template-columns:1fr 1fr; } }
  .meal-block{ margin-bottom:14px; }
  .meal-head{ font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#888; margin-bottom:6px; display:flex; justify-content:space-between; }
  .food-entry{ display:flex; align-items:center; gap:8px; padding:8px 12px; background:#fff; border-radius:8px; margin-bottom:3px; border:1px solid #eee; }
  .bodystat-card .val{ font-size:22px; font-weight:700; color:var(--header); }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────
const STORAGE_KEY = "mise-en-place-data";
const CATEGORIES = ["Produce","Dairy","Meat & Seafood","Grains & Pasta","Canned & Jarred","Frozen","Spices & Condiments","Snacks","Beverages","Other"];
const SUBSECTIONS = ["Freezer","Deep Freezer","Refrigerator","Pantry"];
const SUBSECTION_ICONS = { "Freezer":"🧊", "Deep Freezer":"❄️", "Refrigerator":"🌡️", "Pantry":"🗄️" };
const TABS = ["WHTAH","Recipes","Meal Plan","Grocery List","Nutrition"];

const DEFAULT_DATA = {
  pantry: [],
  recipes: [],
  mealPlan: {},
  groceryList: [],
  nutritionLog: [],
  userProfile: null
};

const EMPTY_ITEM = { name:"", category:"Produce", qty:"", expiry:"", brand:"", store:"", notes:"", subsection:"" };

const MEAL_SLOTS = ["Breakfast","Lunch","Dinner"];
const EMPTY_NUTRITION = {
  calories:"",protein:"",carbs:"",fat:"",fiber:"",sugar:"",sodium:"",
  saturatedFat:"",transFat:"",cholesterol:"",
  vitA:"",vitC:"",vitD:"",vitE:"",vitK:"",
  vitB1:"",vitB2:"",vitB3:"",vitB5:"",vitB6:"",vitB7:"",vitB9:"",vitB12:"",
  calcium:"",iron:"",magnesium:"",phosphorus:"",potassium:"",zinc:"",copper:"",manganese:"",selenium:"",chromium:"",iodine:""
};
const MICRO_GROUPS = [
  { label:"Vitamins", fields:[
    {key:"vitA",label:"Vit A",unit:"mcg"},{key:"vitC",label:"Vit C",unit:"mg"},{key:"vitD",label:"Vit D",unit:"mcg"},
    {key:"vitE",label:"Vit E",unit:"mg"},{key:"vitK",label:"Vit K",unit:"mcg"},{key:"vitB1",label:"B1",unit:"mg"},
    {key:"vitB2",label:"B2",unit:"mg"},{key:"vitB3",label:"B3",unit:"mg"},{key:"vitB5",label:"B5",unit:"mg"},
    {key:"vitB6",label:"B6",unit:"mg"},{key:"vitB7",label:"B7",unit:"mcg"},{key:"vitB9",label:"B9",unit:"mcg"},{key:"vitB12",label:"B12",unit:"mcg"}
  ]},
  { label:"Minerals", fields:[
    {key:"calcium",label:"Calcium",unit:"mg"},{key:"iron",label:"Iron",unit:"mg"},{key:"magnesium",label:"Magnesium",unit:"mg"},
    {key:"phosphorus",label:"Phosphorus",unit:"mg"},{key:"potassium",label:"Potassium",unit:"mg"},{key:"zinc",label:"Zinc",unit:"mg"},
    {key:"copper",label:"Copper",unit:"mg"},{key:"manganese",label:"Manganese",unit:"mg"},{key:"selenium",label:"Selenium",unit:"mcg"},
    {key:"chromium",label:"Chromium",unit:"mcg"},{key:"iodine",label:"Iodine",unit:"mcg"}
  ]},
  { label:"Fats", fields:[
    {key:"saturatedFat",label:"Saturated Fat",unit:"g"},{key:"transFat",label:"Trans Fat",unit:"g"},{key:"cholesterol",label:"Cholesterol",unit:"mg"}
  ]}
];

const MACRO_IMPORT_PROMPT = `This is a CSV export from the MacroFactor nutrition tracking app (granular export). It may have one row per day or per-meal/per-food rows. Aggregate it into ONE total per calendar day.

Return ONLY valid JSON, no markdown, no preamble, in exactly this format:
{
  "days": [
    {
      "date": "YYYY-MM-DD",
      "calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0,"sugar":0,"sodium":0,
      "saturatedFat":0,"transFat":0,"cholesterol":0,
      "vitA":0,"vitC":0,"vitD":0,"vitE":0,"vitK":0,
      "vitB1":0,"vitB2":0,"vitB3":0,"vitB5":0,"vitB6":0,"vitB7":0,"vitB9":0,"vitB12":0,
      "calcium":0,"iron":0,"magnesium":0,"phosphorus":0,"potassium":0,"zinc":0,
      "copper":0,"manganese":0,"selenium":0,"chromium":0,"iodine":0
    }
  ]
}
Units: calories=kcal, protein/carbs/fat/fiber/sugar/saturatedFat/transFat=g, sodium/calcium/iron/magnesium/phosphorus/potassium/zinc/copper/manganese/cholesterol=mg, vitA/vitD/vitK/vitB7/vitB9/vitB12/selenium/chromium/iodine=mcg, vitC/vitE/vitB1/vitB2/vitB3/vitB5/vitB6=mg.
Use 0 for anything not present. One object per calendar day, oldest to newest. Paste your CSV data after this prompt.`;

const IMPORT_PROMPT = `Extract every food or household consumable item from what I'm about to share (could be a receipt photo, order confirmation screenshot, or a plain list).

Return ONLY valid JSON, no markdown, no preamble, in exactly this format:
{
  "items": [
    {
      "name": "clean readable product name",
      "qty": "quantity with unit if known, else empty string",
      "brand": "brand name if identifiable, else empty string",
      "category": one of exactly: "Produce","Dairy","Meat & Seafood","Grains & Pasta","Canned & Jarred","Frozen","Spices & Condiments","Snacks","Beverages","Other",
      "notes": "useful detail like variety, size, organic, else empty string",
      "store": "store or service name if identifiable, else empty string"
    }
  ]
}`;

// ── STATE ─────────────────────────────────────────────────────────────────
let state = loadState();
let currentTab = "WHTAH";
let saveStatus = "saved";

// WHTAH-local UI state (not persisted)
let pantrySearch = "";
let pantryFilterCat = "All";
let pantryFilterSub = "All";
let showAddForm = false;
let editingId = null;
let showImportModal = false;
let importStage = "instructions"; // instructions -> review
let importParsed = [];
let showAssignModal = false;
let assignChoices = {};
let toastMsg = "";

// Nutrition-local UI state (not persisted)
let nutritionSubview = "today"; // today | trends | micros | body | profile
let nutritionSelectedDate = todayStr();
let showLogFoodForm = false;
let logFoodMeal = "Breakfast";
let weightQuickInput = "";
let bodyForm = { date: todayStr(), weight:"", waist:"", hips:"", chest:"", arms:"", thighs:"" };
let showMacroImportModal = false;
let macroImportStage = "instructions"; // instructions -> review
let macroImportDays = [];

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return { ...DEFAULT_DATA, ...JSON.parse(raw) };
  }catch(e){ console.error("Load failed", e); }
  return { ...DEFAULT_DATA };
}

function saveState(){
  saveStatus = "saving";
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    saveStatus = "saved";
  }catch(e){
    saveStatus = "error";
    console.error("Save failed", e);
  }
  renderHeaderStatus();
}

function showToast(msg){
  toastMsg = msg;
  render();
  setTimeout(()=>{ toastMsg = ""; render(); }, 3200);
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function esc(str){
  return String(str ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function todayStr(){ return new Date().toISOString().slice(0,10); }

function getExpiryStatus(item){
  if(!item.expiry) return null;
  const days = Math.ceil((new Date(item.expiry) - new Date()) / 86400000);
  if(days < 0) return { tone:"expired", label:"Expired" };
  if(days <= 7) return { tone:"soon", label:"Use Soon" };
  return { tone:"fresh", label:"Fresh" };
}

function categoryOptions(selected){
  return CATEGORIES.map(c => `<option value="${esc(c)}" ${c===selected?"selected":""}>${esc(c)}</option>`).join("");
}
function subsectionOptions(selected){
  return `<option value="">— pick one —</option>` + SUBSECTIONS.map(s => `<option value="${esc(s)}" ${s===selected?"selected":""}>${esc(s)}</option>`).join("");
}

// ── RENDER: SHELL ─────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div>
        <div class="kicker">Kitchen</div>
        <h1>Meal &amp; Fitness Planner</h1>
      </div>
      <nav>
        ${TABS.map(t => `<button class="${t===currentTab?'active':''}" onclick="setTab('${t}')">${t}</button>`).join("")}
        <span class="save-note" id="save-note"></span>
      </nav>
    </header>
    <main id="main"></main>
    ${toastMsg ? `<div class="toast">${esc(toastMsg)}</div>` : ""}
    ${showImportModal ? renderImportModal() : ""}
    ${showAssignModal ? renderAssignModal() : ""}
  `;
  renderHeaderStatus();
  renderTab();
}

function renderHeaderStatus(){
  const el = document.getElementById("save-note");
  if(!el) return;
  el.textContent = saveStatus === "saving" ? "⟳ Saving…" : saveStatus === "error" ? "⚠ Save error" : "✓ Saved";
}

function setTab(tab){
  currentTab = tab;
  showAddForm = false;
  editingId = null;
  render();
}

function renderTab(){
  const main = document.getElementById("main");
  if(currentTab === "WHTAH"){ main.innerHTML = pantryTabShell(); renderPantryTable(); }
  else if(currentTab === "Nutrition"){ main.innerHTML = nutritionTabShell(); renderNutritionSubview(); }
  else{
    main.innerHTML = `<div class="empty-state"><div class="emoji">🚧</div><div>${esc(currentTab)} is coming in the next build pass.</div></div>`;
  }
}

// ── WHTAH TAB ─────────────────────────────────────────────────────────────
function pantryTabShell(){
  const unassigned = state.pantry.filter(i => !i.subsection);
  const useSoonCount = state.pantry.filter(i => { const s = getExpiryStatus(i); return s && (s.tone==="soon"||s.tone==="expired"); }).length;

  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${state.pantry.length}</div><div class="stat-label">Items in stock</div></div>
      <div class="stat-card"><div class="stat-value" style="${useSoonCount>0?'color:#5b3f78':''}">${useSoonCount}</div><div class="stat-label">Use soon</div></div>
      <div class="stat-card"><div class="stat-value" style="${unassigned.length>0?'color:#2c3454':''}">${unassigned.length}</div><div class="stat-label">Unassigned</div></div>
    </div>

    ${unassigned.length > 0 ? `
      <div class="banner">
        <div><b>📦 ${unassigned.length} item${unassigned.length!==1?'s':''} need a home.</b><span class="sub">Assign them to Freezer, Fridge, or Pantry.</span></div>
        <button class="btn-primary" style="background:var(--banner-btn)" onclick="openAssignModal()">Assign Now</button>
      </div>` : ""}

    <div class="controls-row">
      <input type="text" id="pantry-search" placeholder="Search by name or brand…" value="${esc(pantrySearch)}" oninput="onPantrySearch(this.value)">
      <select id="pantry-filter-sub" onchange="onPantryFilterSub(this.value)">
        <option value="All" ${pantryFilterSub==='All'?'selected':''}>All locations</option>
        ${SUBSECTIONS.map(s=>`<option value="${esc(s)}" ${pantryFilterSub===s?'selected':''}>${esc(s)}</option>`).join("")}
      </select>
      <select id="pantry-filter-cat" onchange="onPantryFilterCat(this.value)">
        <option value="All" ${pantryFilterCat==='All'?'selected':''}>All categories</option>
        ${categoryOptions(pantryFilterCat==='All'?null:pantryFilterCat)}
      </select>
      <button class="btn-primary" onclick="toggleAddForm()">+ Add Item</button>
      <button class="btn-ghost" onclick="openImportModal()">📋 Import Items</button>
      <button class="btn-ghost" onclick="exportBackup()">⬇ Export Backup</button>
      <label class="btn-ghost" style="display:inline-block;">
        ⬆ Import Backup
        <input type="file" accept=".json" style="display:none" onchange="importBackup(this.files[0])">
      </label>
    </div>

    ${showAddForm ? `
      <div class="card">
        <h3 style="font-size:16px;margin-bottom:12px;">Add Item</h3>
        ${itemFormFields("add")}
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn-primary" onclick="submitAddItem()">Add</button>
          <button class="btn-ghost" onclick="toggleAddForm()">Cancel</button>
        </div>
      </div>` : ""}

    <div class="table-wrap">
      <div class="table-scroll">
        <div class="table-inner">
          <div class="t-head"><div>Item</div><div>Category</div><div>Location</div><div>Qty</div><div>Status</div><div></div></div>
          <div id="pantry-table-body"></div>
        </div>
      </div>
    </div>
  `;
}

function itemFormFields(mode, item){
  item = item || EMPTY_ITEM;
  const prefix = mode === "edit" ? "edit" : "add";
  return `
    <div class="form-grid">
      <div><label class="field-label">Item Name</label><input type="text" id="${prefix}-name" value="${esc(item.name)}" placeholder="e.g. Whole Milk"></div>
      <div><label class="field-label">Category</label><select id="${prefix}-category">${categoryOptions(item.category)}</select></div>
      <div><label class="field-label">Stored In</label><select id="${prefix}-subsection">${subsectionOptions(item.subsection)}</select></div>
      <div><label class="field-label">Quantity</label><input type="text" id="${prefix}-qty" value="${esc(item.qty)}" placeholder="e.g. 2 cups"></div>
      <div><label class="field-label">Expiry Date</label><input type="date" id="${prefix}-expiry" value="${esc(item.expiry)}"></div>
    </div>
    <div class="form-grid3">
      <div><label class="field-label">Brand</label><input type="text" id="${prefix}-brand" value="${esc(item.brand)}" placeholder="e.g. Organic Valley"></div>

function getFilteredSortedPantry(){
  const filtered = state.pantry.filter(i =>
    (pantryFilterCat==="All" || i.category===pantryFilterCat) &&
    (pantryFilterSub==="All" || (i.subsection||"")===pantryFilterSub) &&
    (i.name.toLowerCase().includes(pantrySearch.toLowerCase()) || (i.brand||"").toLowerCase().includes(pantrySearch.toLowerCase()))
  );
  const rank = { expired:0, soon:1, fresh:2 };
  return filtered.sort((a,b)=>{
    const sa=getExpiryStatus(a), sb=getExpiryStatus(b);
    const ra = sa?rank[sa.tone]:3, rb = sb?rank[sb.tone]:3;
    if(ra!==rb) return ra-rb;
    return a.name.localeCompare(b.name);
  });
}

// ── NUTRITION: CALCULATIONS ──────────────────────────────────────────────
function calcRDA(profile){
  if(!profile) return {
    calories:2000,protein:50,carbs:275,fat:78,fiber:28,sugar:50,sodium:2300,
    vitA:900,vitC:90,vitD:20,vitE:15,vitK:120,vitB1:1.2,vitB2:1.3,vitB3:16,vitB5:5,vitB6:1.7,vitB7:30,vitB9:400,vitB12:2.4,
    calcium:1000,iron:8,magnesium:420,phosphorus:700,potassium:3400,zinc:11,copper:0.9,manganese:2.3,selenium:55,chromium:35,iodine:150,
    saturatedFat:20,cholesterol:300
  };
  const { age, sex, weight, height, activityLevel, goal, goalRate } = profile;
  const w = (Number(weight)||154) * 0.453592, h = (Number(height)||67) * 2.54, a = Number(age)||30;
  const bmr = sex==="female" ? 10*w+6.25*h-5*a-161 : 10*w+6.25*h-5*a+5;
  const actMult = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, veryActive:1.9 };
  const tdee = bmr * (actMult[activityLevel]||1.55);
  const rateAdjust = goal==="lose" ? -(Number(goalRate)||1)*500 : goal==="gain" ? (Number(goalRate)||0.5)*500 : 0;
  const cals = Math.round(tdee + rateAdjust);
  const f = sex==="female";
  return {
    calories:cals, protein:Math.round(w*1.6), carbs:Math.round(cals*0.45/4), fat:Math.round(cals*0.3/9),
    fiber:f?25:38, sugar:50, sodium:2300,
    vitA:f?700:900, vitC:f?75:90, vitD:a>=70?20:15, vitE:15, vitK:f?90:120,
    vitB1:f?1.1:1.2, vitB2:f?1.1:1.3, vitB3:f?14:16, vitB5:5, vitB6:a>=50?(f?1.5:1.7):1.3, vitB7:30, vitB9:400, vitB12:2.4,
    calcium:a>=50?(f?1200:1000):1000, iron:(f&&a<51)?18:8,
    magnesium:f?(a>=31?320:310):(a>=31?420:400), phosphorus:700, potassium:f?2600:3400,
    zinc:f?8:11, copper:0.9, manganese:f?1.8:2.3, selenium:55, chromium:f?(a>=51?20:25):(a>=51?30:35), iodine:150,
    saturatedFat:Math.round(cals*0.07/9), cholesterol:300
  };
}

function calcWeightTrend(weightLog){
  if(!weightLog || !weightLog.length) return [];
  const sorted = [...weightLog].sort((a,b)=>a.date.localeCompare(b.date));
  const trend = [];
  for(let i=0;i<sorted.length;i++){
    const window = sorted.slice(Math.max(0,i-6), i+1);
    const sum = window.reduce((a,_,j)=>a+(j+1),0);
    const avg = window.reduce((a,e,j)=>a+Number(e.weight)*(j+1),0)/sum;
    trend.push({ date:sorted[i].date, weight:Number(sorted[i].weight), trend:Math.round(avg*10)/10 });
  }
  return trend;
}

function calcDayTotals(entries){
  return entries.reduce((acc,entry)=>{
    const n = entry.nutrition || {};
    const s = Number(entry.servings)||1;
    Object.keys(EMPTY_NUTRITION).forEach(k=>{ acc[k] = (acc[k]||0) + (Number(n[k])||0)*s; });
    return acc;
  },{});
}

function last7Days(){
  return Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const dateStr = d.toISOString().slice(0,10);
    const entries = (state.nutritionLog||[]).filter(e=>e.date===dateStr);
    return { date:dateStr, label:d.toLocaleDateString("en",{weekday:"short"}), ...calcDayTotals(entries) };
  });
}

function macroRingSvg(value, target, label, color){
  const pct = target ? Math.min(1, Number(value)/target) : 0;
  const size=72, r=(size-10)/2, circ=2*Math.PI*r;
  return `<div class="ring-item">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#f0ede6" stroke-width="7"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-dasharray="${circ*pct} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="val" style="color:${color}">${Math.round(Number(value)||0)}</div>
    <div class="lbl">${label}</div>
  </div>`;
}

function nutrientBarHtml(label, value, target, unit, subtle){
  const pct = target ? Math.min(110,(Number(value)/target)*100) : 0;
  const over = pct>100;
  const fill = over ? "#8d6e63" : subtle ? "#9e9e9e" : "#5d8a6e";
  return `<div class="nbar-row">
    <div class="nbar-labels"><span style="color:#555;font-weight:500">${esc(label)}</span><span style="color:${pct===0?'#ccc':over?'#8d6e63':'#666'}">${Math.round(Number(value)||0)}<span style="color:#bbb">/${target}${unit}</span></span></div>
    <div class="nbar-track"><div class="nbar-fill" style="width:${Math.min(100,pct)}%;background:${fill};opacity:${pct===0?0.2:1}"></div></div>
  </div>`;
}

// Generic RFC4180-ish CSV parser (handles quoted fields, embedded commas/quotes)
function parseCSV(text){
  const rows = []; let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"'){ if(next === '"'){ field += '"'; i++; } else { inQuotes = false; } }
      else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ',') { row.push(field); field = ""; }
      else if(c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length>1 || (r.length===1 && r[0]!==""));
}
function csvToObjects(text){
  const rows = parseCSV(text);
  if(!rows.length) return [];
  const headers = rows[0];
  return rows.slice(1).map(r => { const o={}; headers.forEach((h,i)=>o[h]=r[i]); return o; });
}

// MacroFactor granular export column → our nutrition schema
const MACROFACTOR_COLUMN_MAP = {
  "Calories (kcal)":"calories", "Protein (g)":"protein", "Carbs (g)":"carbs", "Fat (g)":"fat",
  "Fiber (g)":"fiber", "Sugars (g)":"sugar", "Sodium (mg)":"sodium",
  "Saturated Fat (g)":"saturatedFat", "Trans Fat (g)":"transFat", "Cholesterol (mg)":"cholesterol",
  "Vitamin A (mcg)":"vitA", "Vitamin C (mg)":"vitC", "Vitamin D (mcg)":"vitD", "Vitamin E (mg)":"vitE", "Vitamin K (mcg)":"vitK",
  "B1, Thiamine (mg)":"vitB1", "B2, Riboflavin (mg)":"vitB2", "B3, Niacin (mg)":"vitB3", "B5, Pantothenic Acid (mg)":"vitB5",
  "B6, Pyridoxine (mg)":"vitB6", "Folate (mcg)":"vitB9", "B12, Cobalamin (mcg)":"vitB12",
  "Calcium (mg)":"calcium", "Iron (mg)":"iron", "Magnesium (mg)":"magnesium", "Phosphorus (mg)":"phosphorus",
  "Potassium (mg)":"potassium", "Zinc (mg)":"zinc", "Copper (mg)":"copper", "Manganese (mg)":"manganese", "Selenium (mcg)":"selenium"
};

function aggregateMacroFactorCSV(text){
  const rows = csvToObjects(text);
  const byDate = {};
  rows.forEach(row => {
    const date = (row["Date"]||"").trim();
    if(!date) return;
    if(!byDate[date]) byDate[date] = { date, ...Object.fromEntries(Object.keys(EMPTY_NUTRITION).map(k=>[k,0])) };
    Object.entries(MACROFACTOR_COLUMN_MAP).forEach(([col,key]) => {
      const val = parseFloat(row[col]);
      if(!isNaN(val)) byDate[date][key] += val;
    });
  });
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}

function handleMacroCsvFile(file){
  if(!file) return;
  const errEl = document.getElementById("macro-csv-error");
  if(errEl) errEl.textContent = "";
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const days = aggregateMacroFactorCSV(reader.result);
      if(!days.length) throw new Error("No dated rows found — check this is the granular CSV export.");
      macroImportDays = days.map((d,i)=>({ ...d, id:Date.now()+i, selected:true }));
      macroImportStage = "review";
      renderTab();
    }catch(e){
      if(errEl) errEl.textContent = "Couldn't read that CSV: " + e.message;
    }
  };
  reader.readAsText(file);
}

    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <div><h2 style="font-size:18px;">Review Days</h2><div style="font-size:12px;color:#888;" id="macro-review-count">${selectedCount} of ${macroImportDays.length} selected — overwrites existing data for that date</div></div>
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="macroSelectAll(true)">All</button>
          <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="macroSelectAll(false)">None</button>
          <button class="icon-btn" style="font-size:20px;" onclick="closeMacroImportModal()">✕</button>
        </div>
      </div>
      <div class="modal-body" id="macro-review-body">${renderMacroReviewRows()}</div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="confirmMacroImport()">✅ Import ${selectedCount} day${selectedCount!==1?'s':''}</button>
        <button class="btn-ghost" onclick="closeMacroImportModal()" style="margin-left:auto;">Cancel</button>
      </div>
    </div>
  </div>`;
}
function renderMacroReviewRows(){
  return macroImportDays.map(d=>`
    <div class="review-row" style="opacity:${d.selected?1:0.4}">
      <input type="checkbox" ${d.selected?"checked":""} onchange="toggleMacroSel(${d.id}, this.checked)">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:700;font-size:13px;">${esc(d.date)}</div>
          <div style="font-size:11px;color:#888;">${Math.round(d.protein)}g P · ${Math.round(d.carbs)}g C · ${Math.round(d.fat)}g F</div>
        </div>
        <div style="font-size:14px;font-weight:700;color:var(--header);">${Math.round(d.calories)} kcal</div>
      </div>
    </div>`).join("");
}
function renderMacroReviewBody(){
  const body = document.getElementById("macro-review-body");
  if(body) body.innerHTML = renderMacroReviewRows();
  const count = document.getElementById("macro-review-count");
  const selectedCount = macroImportDays.filter(d=>d.selected).length;
  if(count) count.textContent = `${selectedCount} of ${macroImportDays.length} selected — overwrites existing data for that date`;
}

// ── BACKUP EXPORT / IMPORT ───────────────────────────────────────────────
function exportBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `mise-en-place-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      state = { ...DEFAULT_DATA, ...parsed };
      saveState();
      render();
      showToast("✅ Backup loaded");
    }catch(e){
      showToast("Couldn't read that backup file");
    }
  };
  reader.readAsText(file);
}

// ── INIT ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
